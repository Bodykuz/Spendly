<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spendly — web preview</title>
  <style>
    :root {
      --bg: #0b0b12;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --indigo: #6366f1;
      --indigo-2: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --pink: #ec4899;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,.25), transparent 60%),
        radial-gradient(800px 500px at 110% 10%, rgba(139,92,246,.18), transparent 60%),
        var(--bg);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .sidebar {
      position: sticky; top: 24px;
      height: calc(100vh - 48px);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px;
      padding: 18px;
      display: flex; flex-direction: column;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 6px 16px;
    }
    .brand .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--indigo), var(--indigo-2));
      display: grid; place-items: center; color: #fff; font-weight: 800;
    }
    .brand h1 {
      font-size: 18px; margin: 0; font-weight: 700; letter-spacing: .2px;
    }
    .nav { display: flex; flex-direction: column; gap: 4px; }
    .nav button {
      display: flex; align-items: center; gap: 10px;
      width: 100%; text-align: left;
      background: transparent; color: var(--text);
      border: 0; padding: 10px 12px; border-radius: 12px;
      cursor: pointer; font-size: 14px;
    }
    .nav button:hover { background: rgba(255,255,255,.05); }
    .nav button.active {
      background: linear-gradient(135deg, rgba(99,102,241,.35), rgba(139,92,246,.25));
    }
    .nav .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--indigo); }

    /* Language switcher */
    .lang-switcher {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .lang-switcher .label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); padding: 0 4px 8px;
    }
    .lang-group {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
      background: rgba(255,255,255,.04);
      padding: 4px; border-radius: 10px;
    }
    .lang-group button {
      background: transparent; color: var(--muted); border: 0;
      padding: 8px 4px; border-radius: 7px; cursor: pointer;
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .lang-group button.active {
      background: linear-gradient(135deg, var(--indigo), var(--indigo-2));
      color: #fff;
    }
    .sidebar-note {
      padding-top: 12px;
      color: var(--muted);
      font-size: 11px; line-height: 1.5;
    }

    .stage {
      display: grid;
      place-items: start center;
    }
    .phone {
      width: 390px;
      height: 800px;
      background: #000;
      border-radius: 50px;
      padding: 12px;
      box-shadow:
        0 40px 80px rgba(0,0,0,.55),
        inset 0 0 0 2px rgba(255,255,255,.06);
      position: relative;
    }
    .phone::before {
      content: "";
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 30px; border-radius: 16px; background: #000;
      z-index: 3;
    }
    .screen {
      width: 100%; height: 100%;
      border-radius: 38px;
      background: #0b0b12;
      overflow: hidden;
      position: relative;
      display: flex; flex-direction: column;
    }
    .statusbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px 6px;
      font-size: 13px; color: #fff; font-weight: 600;
    }
    .screen .content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 80px;
    }
    .screen .content::-webkit-scrollbar { width: 0; }

    /* tab bar */
    .tabbar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 76px;
      background: rgba(17,24,39,.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.06);
      display: grid; grid-template-columns: repeat(5, 1fr);
    }
    .tabbar button {
      background: transparent; border: 0; color: var(--muted);
      font-size: 11px; cursor: pointer; padding: 10px 0 18px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .tabbar button.active { color: var(--indigo); }
    .tabbar svg { width: 22px; height: 22px; }

    /* ── Shared ── */
    .title {
      padding: 8px 20px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .title h2 { font-size: 22px; margin: 0; font-weight: 800; }
    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 14px;
      margin: 6px 16px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .row { display: flex; align-items: center; justify-content: space-between; }
    .pill {
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .pill.green { background: rgba(16,185,129,.15); color: #34d399; }
    .pill.orange { background: rgba(245,158,11,.15); color: #fbbf24; }
    .pill.red { background: rgba(239,68,68,.18); color: #fca5a5; }
    .pill.gray { background: rgba(156,163,175,.2); color: #d1d5db; }
    .icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center; color: #fff; font-size: 16px;
    }
    .amount-pos { color: var(--green); font-weight: 700; }
    .amount-neg { color: #fca5a5; font-weight: 700; }

    /* ── Auth screen ── */
    .auth {
      padding: 24px;
      height: 100%;
      display: flex; flex-direction: column; justify-content: center;
      gap: 24px;
    }
    .auth-logo {
      width: 84px; height: 84px; border-radius: 50%;
      background: linear-gradient(135deg, var(--indigo), var(--indigo-2));
      display: grid; place-items: center; margin: 0 auto;
      color: #fff; font-size: 32px;
      box-shadow: 0 20px 40px rgba(99,102,241,.4);
    }
    .auth h1 { font-size: 32px; text-align: center; margin: 0; font-weight: 800; }
    .auth .sub { text-align: center; color: var(--muted); margin-top: -16px; }
    .auth .box {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px;
      padding: 18px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .input {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--indigo), var(--indigo-2));
      color: #fff; border: 0; padding: 14px; border-radius: 14px;
      font-weight: 700; cursor: pointer; font-size: 15px;
    }
    .btn-link {
      background: transparent; color: var(--indigo); border: 0;
      font-size: 14px; cursor: pointer; padding: 6px;
    }

    /* ── Dashboard ── */
    .hero {
      margin: 8px 16px 14px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--indigo), var(--indigo-2));
      color: #fff;
    }
    .hero .balance { font-size: 40px; font-weight: 800; letter-spacing: -1px; }
    .hero .label { opacity: .8; font-size: 13px; }
    .hero .meta { display: flex; gap: 14px; opacity: .9; font-size: 12px; margin-top: 8px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 16px 14px; }
    .stat {
      background: var(--surface);
      border-radius: 14px; padding: 12px;
      border: 1px solid rgba(255,255,255,.05);
    }
    .stat .lbl { font-size: 11px; color: var(--muted); }
    .stat .val { font-size: 16px; font-weight: 700; margin-top: 2px; white-space: nowrap; }
    .chart-card { margin: 0 16px 14px; }
    .chart {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
      height: 130px; align-items: end; padding-top: 10px;
    }
    .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bars { display: flex; gap: 3px; align-items: end; height: 100px; }
    .bar { width: 12px; border-radius: 4px 4px 0 0; }
    .bar.g { background: linear-gradient(180deg, #34d399, #059669); }
    .bar.r { background: linear-gradient(180deg, #f87171, #dc2626); }
    .bar-col .m { font-size: 10px; color: var(--muted); }
    .legend { display: flex; gap: 12px; font-size: 11px; color: var(--muted); margin-top: 6px; }
    .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }

    /* Transactions */
    .tx-header {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      margin: 4px 16px 10px;
      background: rgba(255,255,255,.06);
      border-radius: 10px; padding: 2px;
    }
    .tx-header button {
      background: transparent; color: var(--muted); border: 0;
      padding: 8px; border-radius: 8px; cursor: pointer; font-size: 12px;
    }
    .tx-header button.active { background: var(--surface); color: var(--text); }
    .group-header { padding: 14px 20px 6px; color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .tx {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,.04);
    }
    .tx .name { font-size: 14px; font-weight: 500; }
    .tx .cat { font-size: 11px; color: var(--muted); }
    .tx .right { margin-left: auto; text-align: right; }
    .tx .amount { font-size: 14px; font-weight: 700; }

    /* Insights */
    .ins {
      margin: 8px 16px;
      padding: 14px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      display: flex; gap: 12px;
    }
    .ins .title-s { font-weight: 600; }
    .ins .body-s { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .ins .amt { font-weight: 700; margin-top: 6px; }

    /* Budgets */
    .bar-track { height: 6px; background: rgba(255,255,255,.08); border-radius: 5px; margin-top: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; }

    /* Banks */
    .inst {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,.04);
      cursor: pointer;
    }
    .inst .logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(255,255,255,.08);
      display: grid; place-items: center; font-weight: 800; font-size: 14px;
    }
    .inst .name { font-weight: 500; }
    .inst .days { font-size: 11px; color: var(--muted); }
    .chev { color: var(--muted); margin-left: auto; }

    /* Settings */
    .settings-row {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,.04);
      display: flex; justify-content: space-between; align-items: center;
    }
    .settings-group-title { padding: 18px 20px 6px; color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .sign-out { color: var(--red); font-weight: 600; }

    .small-note { text-align: center; color: var(--muted); font-size: 11px; padding: 16px 24px; }

    .caption-banner {
      position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
      background: var(--surface); border: 1px solid rgba(255,255,255,.06);
      padding: 8px 14px; border-radius: 999px; color: var(--muted); font-size: 12px;
      z-index: 5;
    }

    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <h1>Spendly</h1>
          <div class="muted" style="font-size:12px;" data-i18n="brand.sub">Web UI preview</div>
        </div>
      </div>
      <div class="nav" id="nav">
        <button data-screen="auth"><span class="dot"></span> <span data-i18n="nav.auth"></span></button>
        <button data-screen="dashboard" class="active"><span class="dot"></span> <span data-i18n="nav.dashboard"></span></button>
        <button data-screen="transactions"><span class="dot"></span> <span data-i18n="nav.transactions"></span></button>
        <button data-screen="insights"><span class="dot"></span> <span data-i18n="nav.insights"></span></button>
        <button data-screen="budgets"><span class="dot"></span> <span data-i18n="nav.budgets"></span></button>
        <button data-screen="banks"><span class="dot"></span> <span data-i18n="nav.banks"></span></button>
        <button data-screen="settings"><span class="dot"></span> <span data-i18n="nav.settings"></span></button>
      </div>

      <div class="lang-switcher">
        <div class="label" data-i18n="lang.label">Language</div>
        <div class="lang-group" id="langGroup">
          <button data-lang="pl">🇵🇱 PL</button>
          <button data-lang="uk">🇺🇦 UK</button>
          <button data-lang="en">🇬🇧 EN</button>
        </div>
        <div class="sidebar-note" data-i18n="sidebar.note"></div>
      </div>
    </aside>

    <main class="stage">
      <div class="phone">
        <div class="screen">
          <div class="statusbar">
            <span>9:41</span>
            <span>● ● ●</span>
          </div>
          <div class="content" id="content"></div>

          <div class="tabbar" id="tabbar">
            <button data-screen="dashboard" class="active">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-10 10h10V2z"/><path d="M14 2v10h8A10 10 0 0 0 14 2z" opacity=".6"/><path d="M12 12v10a10 10 0 0 0 10-10H12z" opacity=".3"/></svg>
              <span data-i18n="tab.dashboard"></span>
            </button>
            <button data-screen="transactions">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
              <span data-i18n="tab.transactions"></span>
            </button>
            <button data-screen="insights">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"/></svg>
              <span data-i18n="tab.insights"></span>
            </button>
            <button data-screen="budgets">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
              <span data-i18n="tab.budgets"></span>
            </button>
            <button data-screen="settings">
              <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0v1H4z"/></svg>
              <span data-i18n="tab.settings"></span>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="caption-banner" data-i18n="banner.hint"></div>

    function applyStaticI18n() {

      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.innerHTML = t(el.dataset.i18n);

        b.classList.toggle('active', b.dataset.lang === lang);

    function setActive(screen) {
      currentScreen = screen;
      document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('active', b.dataset.screen === screen));

      renderers[screen]();
      content.scrollTop = 0;
    }

    nav.addEventListener('click', e => {
      const btn = e.target.closest('button[data-screen]');
      if (btn) setActive(btn.dataset.screen);
    });

      if (btn) setActive(btn.dataset.screen);
    });
    langGroup.addEventListener('click', e => {
      const btn = e.target.closest('button[data-lang]');
      if (!btn) return;
      lang = btn.dataset.lang;
      localStorage.setItem('spendly_lang', lang);
      applyStaticI18n();
      renderers[currentScreen]();

          <div class="group-header">${t('bud.monthlyBudgets')}</div>
          ${budgetsHtml}
          <div class="card" style="text-align:center;">
            <button class="btn-link">${t('bud.addBudget')}</button>
          </div>
          <div class="group-header">${t('bud.savingGoals')}</div>
          ${goalsHtml}
          <div class="card" style="text-align:center;">
            <button class="btn-link">${t('bud.addGoal')}</button>
          </div>
        `;
      },

      banks() {
        content.innerHTML = `
          <div class="title"><h2>${t('bank.title')}</h2></div>
          <div class="group-header">${t('bank.connected')}</div>
          ${DATA.linked.map(b => `
            <div class="inst">
              <div class="logo">${b.logo}</div>
              <div>
                <div class="name">${b.name}</div>
                <div class="days">
                  <span class="pill green">${t('bank.active')}</span>
                  <span class="muted" style="margin-left:6px;">${t('bank.syncAgo', { t: t(b.agoKey) })}</span>
                </div>
              </div>
              <div class="chev">⋯</div>
            </div>
          `).join('')}

          <div class="group-header">${t('bank.addBank')}</div>
          ${DATA.institutions.map(i => `
            <div class="inst">
              <div class="logo">${i.name.slice(0,2).toUpperCase()}</div>
              <div>
                <div class="name">${i.name}</div>
                <div class="days">${t('bank.historyDays', { n: i.days })}</div>
              </div>
              <div class="chev">›</div>
            </div>
          `).join('')}

          <div class="small-note">${t('bank.redirectNote')}</div>
        `;
      },

      settings() {
        content.innerHTML = `
          <div class="title"><h2>${t('set.title')}</h2></div>
          <div class="card">
            <div style="font-weight:600;">Jan Kowalski</div>
            <div class="muted">jan@example.com</div>
          </div>

          <div class="settings-group-title">${t('set.financial')}</div>
          <div class="card" style="padding:0;">
            <div class="settings-row">
              <span>${t('set.connectedBanks')}</span>
              <span class="chev">›</span>
            </div>
          </div>

          <div class="settings-group-title">${t('set.privacy')}</div>
          <div class="card" style="padding:0;">
            <div class="settings-row">
              <span>${t('set.privacyPolicy')}</span><span class="chev">›</span>
            </div>
            <div class="settings-row">
              <span>${t('set.terms')}</span><span class="chev">›</span>
            </div>
          </div>

          <div class="card" style="padding:0;">
            <div class="settings-row sign-out">
              <span>${t('set.signOut')}</span>
            </div>
          </div>

          <div class="small-note">${t('set.version')}</div>
        `;
      },
    };

    // Start
    applyStaticI18n();
    renderers.dashboard();
  </script>
</body>
