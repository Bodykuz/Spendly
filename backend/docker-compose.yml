services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spendly
      POSTGRES_PASSWORD: spendly
      POSTGRES_DB: spendly
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendly"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://spendly:spendly@db:5432/spendly
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_BASE_URL: http://localhost:8000
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://spendly:spendly@db:5432/spendly
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.workers.celery_app.celery_app worker -l info
    depends_on:
      - db
      - redis

  beat:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://spendly:spendly@db:5432/spendly
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.workers.celery_app.celery_app beat -l info
    depends_on:
      - db
      - redis

volumes:
  pgdata:
